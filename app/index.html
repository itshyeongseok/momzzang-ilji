/* ============ 공통 UI ============ */
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}
/* 저장 피드백용 격려 문구 로테이션. 호출할 때마다 다음 문구로 순환. */
const PRAISE=['기록했어요 💪','잘하고 있어요 🔥','오늘도 한 걸음 👍','꾸준함이 이겨요 🙌','기록 완료! 👏'];
let praiseIdx=0;
function praise(){const m=PRAISE[praiseIdx%PRAISE.length];praiseIdx++;return m;}
function openSheet(html){document.getElementById('sheet').innerHTML=html;
  document.getElementById('sheetBg').classList.add('show');
  requestAnimationFrame(()=>document.getElementById('sheet').classList.add('show'));}
function closeSheet(){document.getElementById('sheet').classList.remove('show');
  document.getElementById('sheetBg').classList.remove('show');}

/* ============ 운동 경과시간 표시 ============ */
let elapsedTimer=null;
function updateElapsed(){const t=document.getElementById('elapsedTime');if(t)t.textContent=fmtDur(elapsedSec());}
/* 세 고정 오버레이(경과시간·휴식·인터벌)가 동시에 떠도 겹치지 않게
   아래에서부터 64px씩 단을 쌓아 bottom 오프셋을 배정한다.
   순서(아래→위): 경과시간 → 휴식 → 인터벌. 표시 중인 것만 단을 차지한다. */
function layoutOverlays(){
  const base=86, step=64;
  let tier=0;
  [['elapsedBar',isSessionActive()],
   ['restBar',restRemain>0],
   ['ivBar',ivActive()]].forEach(([id,on])=>{
    const el=document.getElementById(id);if(!el)return;
    if(on){el.style.bottom=`calc(${base+tier*step}px + var(--safe-bot))`;tier++;}
    else el.style.bottom='';
  });
}
function showElapsed(){
  const bar=document.getElementById('elapsedBar');if(!bar)return;
  const on=isSessionActive();
  bar.classList.toggle('show',on);
  if(on)updateElapsed();
  layoutOverlays();
}
function startElapsed(){clearInterval(elapsedTimer);updateElapsed();showElapsed();
  elapsedTimer=setInterval(updateElapsed,1000);}
function stopElapsed(){clearInterval(elapsedTimer);elapsedTimer=null;showElapsed();}

/* ============ 휴식 타이머 ============ */
let restRemain=0, restTimer=null, restRunning=false;
function restPresets(){return DB.settings.restPresets||[60,90,120,180];}
function restDefault(){return DB.settings.restDefault||90;}
function fmtClock(s){const m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}
function showRestBar(){
  const bar=document.getElementById('restBar'),fab=document.getElementById('restFab');
  const sheetTime=document.getElementById('restSheetTime');
  if(restRemain>0){bar.classList.add('show');fab.classList.remove('show');
    document.getElementById('restTime').textContent=fmtClock(restRemain);
    if(sheetTime)sheetTime.textContent=fmtClock(restRemain);
    bar.classList.toggle('warn',restRunning&&restRemain<=10);}
  else{bar.classList.remove('show','warn');fab.classList.toggle('show',tab==='workout');}
  layoutOverlays();
}
function startRest(sec){restRemain=sec;restRunning=true;clearInterval(restTimer);
  restTimer=setInterval(tickRest,1000);showRestBar();}
function tickRest(){if(!restRunning)return;restRemain--;
  if(restRemain<=0){restRemain=0;clearInterval(restTimer);restRunning=false;finishRest();return;}
  showRestBar();}
function finishRest(){beep();if(navigator.vibrate)navigator.vibrate([200,100,200]);
  const bar=document.getElementById('restBar');bar.classList.add('show','done');
  document.getElementById('restTime').textContent='완료!';
  const sheetTime=document.getElementById('restSheetTime');if(sheetTime)sheetTime.textContent='완료!';
  setTimeout(()=>{bar.classList.remove('done');restRemain=0;showRestBar();},2500);}
function stopRest(){clearInterval(restTimer);restRunning=false;restRemain=0;showRestBar();closeSheet();}
function addRestTime(n){if(restRemain<=0)return;restRemain=Math.max(1,restRemain+n);showRestBar();}
function toggleRest(){if(restRemain<=0)return;restRunning=!restRunning;
  clearInterval(restTimer);if(restRunning)restTimer=setInterval(tickRest,1000);
  showRestBar();openRestPicker();}
function beep(){try{const a=new (window.AudioContext||window.webkitAudioContext)();
  const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
  o.type='sine';g.gain.value=.18;o.frequency.setValueAtTime(880,a.currentTime);
  o.frequency.setValueAtTime(1320,a.currentTime+.15);o.start();o.stop(a.currentTime+.32);}catch(e){}}
function openRestPicker(){
  let html=`<h3>⏱ 휴식 타이머</h3>`;
  if(restRemain>0){
    html+=`<div id="restSheetTime" style="text-align:center;font-size:44px;font-weight:800;font-variant-numeric:tabular-nums;margin:4px 0">${fmtClock(restRemain)}</div>
      <div class="grid3 mt8">
        <button class="btn sec" onclick="addRestTime(-15);openRestPicker()">−15초</button>
        <button class="btn sec" onclick="toggleRest()">${restRunning?'⏸ 일시정지':'▶ 계속'}</button>
        <button class="btn sec" onclick="addRestTime(15);openRestPicker()">+15초</button>
      </div>
      <button class="btn danger mt8" onclick="stopRest()">■ 정지</button>`;
  }else{
    html+=`<div class="muted" style="font-size:13px;margin-bottom:10px">세트 사이 휴식 시간을 재요. 0이 되면 소리·진동으로 알려드려요.</div>
      <div class="row" style="flex-wrap:wrap;gap:8px">
      ${restPresets().map(s=>`<button class="chip" onclick="startRest(${s});closeSheet()">${fmtClock(s)}</button>`).join('')}
      </div>
      <div class="divider"></div>
      <label class="fld">직접 입력 (초)</label>
      <div class="row" style="gap:8px">
        <input type="number" inputmode="numeric" id="restCustom" placeholder="예: 75" value="${restDefault()}">
        <button class="btn sm" style="white-space:nowrap" onclick="startCustomRest()">시작</button>
      </div>
      <div class="row mt12" style="align-items:center;gap:9px">
        <input type="checkbox" id="autoRest" ${DB.settings.autoRest!==false?'checked':''} onchange="setAutoRest(this.checked)" style="width:20px;height:20px;flex:none">
        <label for="autoRest" style="font-size:14px">세트 완료 체크하면 자동으로 휴식 시작</label>
      </div>`;
  }
  html+=`<button class="btn sec mt12" onclick="closeSheet()">닫기</button>`;
  openSheet(html);
}
function startCustomRest(){const v=parseInt(document.getElementById('restCustom').value)||0;
  if(v<5){toast('5초 이상 입력해주세요');return;}
  DB.settings.restDefault=v;save();startRest(v);closeSheet();}
function setAutoRest(on){DB.settings.autoRest=on;save();}

/* ============ 인터벌 타이머 (유산소/HIIT) ============
   휴식 타이머와 완전히 별개의 상태/타이머. work→rest→work… 로 라운드를 진행한다.
   설정(work/rest/rounds)은 DB.settings.interval에 저장하고 항상 기본값 폴백. */
let ivPhase=null, ivRemain=0, ivRound=0, ivRounds=0, ivWork=0, ivRest=0, ivRunning=false, ivTimer=null;
function intervalCfg(){const c=DB.settings.interval||{};
  return {work:c.work>0?c.work:30, rest:c.rest>=0?c.rest:15, rounds:c.rounds>0?c.rounds:8};}
function ivActive(){return ivPhase!==null;}
function ivPhaseLabel(){return ivPhase==='work'?'운동':ivPhase==='rest'?'휴식':ivPhase==='done'?'완료!':'';}
function showIntervalBar(){
  const bar=document.getElementById('ivBar');if(!bar)return;
  const sheetTime=document.getElementById('ivSheetTime');
  if(ivActive()){
    bar.classList.add('show');
    bar.classList.toggle('rest',ivPhase==='rest');
    bar.classList.toggle('done',ivPhase==='done');
    const time=ivPhase==='done'?'완료!':fmtClock(ivRemain);
    document.getElementById('ivTime').textContent=time;
    document.getElementById('ivPhaseLbl').textContent=ivPhaseLabel();
    document.getElementById('ivRoundLbl').textContent=ivPhase==='done'?`${ivRounds}라운드 끝`:`${ivRound}/${ivRounds} 라운드`;
    if(sheetTime){sheetTime.textContent=time;
      const sp=document.getElementById('ivSheetPhase');if(sp)sp.textContent=ivPhaseLabel()+(ivPhase==='done'?'':` · ${ivRound}/${ivRounds} 라운드`);}
  }else{
    bar.classList.remove('show','rest','done');
    if(sheetTime){sheetTime.textContent='';}
  }
  layoutOverlays();
}
function startInterval(){
  const c=intervalCfg();
  ivWork=c.work;ivRest=c.rest;ivRounds=c.rounds;
  ivRound=1;ivPhase='work';ivRemain=ivWork;ivRunning=true;
  clearInterval(ivTimer);ivTimer=setInterval(tickInterval,1000);
  beep();if(navigator.vibrate)navigator.vibrate(120);
  showIntervalBar();
}
function tickInterval(){
  if(!ivRunning||ivPhase==='done')return;
  ivRemain--;
  if(ivRemain<=0){ivAdvance();return;}
  showIntervalBar();
}
/* 현재 단계가 끝났을 때의 전환 처리 */
function ivAdvance(){
  beep();if(navigator.vibrate)navigator.vibrate([200,100,200]);
  if(ivPhase==='work'){
    if(ivRest>0){ivPhase='rest';ivRemain=ivRest;showIntervalBar();return;}
    // 휴식 0초: 바로 다음 라운드
    nextIvRound();return;
  }
  // 휴식 끝 → 다음 라운드
  nextIvRound();
}
function nextIvRound(){
  if(ivRound>=ivRounds){ivFinish();return;}
  ivRound++;ivPhase='work';ivRemain=ivWork;showIntervalBar();
}
function ivFinish(){
  clearInterval(ivTimer);ivRunning=false;ivPhase='done';
  showIntervalBar();
  setTimeout(()=>{if(ivPhase==='done')stopInterval();},3000);
}
function stopInterval(){clearInterval(ivTimer);ivRunning=false;ivPhase=null;ivRemain=0;
  showIntervalBar();closeSheet();}
function toggleInterval(){if(!ivActive()||ivPhase==='done')return;ivRunning=!ivRunning;
  clearInterval(ivTimer);if(ivRunning)ivTimer=setInterval(tickInterval,1000);
  showIntervalBar();openIntervalPicker();}
function setIntervalCfg(work,rest,rounds){
  DB.settings.interval={work:Math.max(1,work|0),rest:Math.max(0,rest|0),rounds:Math.max(1,rounds|0)};save();}
function openIntervalPicker(){
  let html=`<h3>🏃 인터벌 타이머</h3>`;
  if(ivActive()){
    html+=`<div id="ivSheetPhase" class="muted" style="text-align:center;font-size:14px;font-weight:700;margin-bottom:2px">${ivPhaseLabel()}${ivPhase==='done'?'':` · ${ivRound}/${ivRounds} 라운드`}</div>
      <div id="ivSheetTime" style="text-align:center;font-size:44px;font-weight:800;font-variant-numeric:tabular-nums;margin:2px 0 6px">${ivPhase==='done'?'완료!':fmtClock(ivRemain)}</div>`;
    if(ivPhase!=='done'){
      html+=`<button class="btn sec" onclick="toggleInterval()">${ivRunning?'⏸ 일시정지':'▶ 계속'}</button>`;
    }
    html+=`<button class="btn danger mt8" onclick="stopInterval()">■ 정지</button>`;
  }else{
    const c=intervalCfg();
    html+=`<div class="muted" style="font-size:13px;margin-bottom:12px">운동·휴식 시간과 라운드 수를 정하면 자동으로 번갈아 알려줘요. 전환 때 소리·진동으로 신호를 줘요.</div>
      <div class="grid3">
        <div><label class="fld">운동(초)</label><input type="number" inputmode="numeric" id="ivWork" value="${c.work}"></div>
        <div><label class="fld">휴식(초)</label><input type="number" inputmode="numeric" id="ivRest" value="${c.rest}"></div>
        <div><label class="fld">라운드</label><input type="number" inputmode="numeric" id="ivRounds" value="${c.rounds}"></div>
      </div>
      <button class="btn mt12" onclick="startCustomInterval()">▶ 시작</button>`;
  }
  html+=`<button class="btn sec mt12" onclick="closeSheet()">닫기</button>`;
  openSheet(html);
}
function startCustomInterval(){
  const work=parseInt(document.getElementById('ivWork').value)||0;
  const rest=parseInt(document.getElementById('ivRest').value)||0;
  const rounds=parseInt(document.getElementById('ivRounds').value)||0;
  if(work<1){toast('운동 시간을 1초 이상 입력해주세요');return;}
  if(rounds<1){toast('라운드를 1 이상 입력해주세요');return;}
  setIntervalCfg(work,rest,rounds);
  startInterval();closeSheet();
}

/* ============ 이벤트 바인딩 ============ */
document.querySelectorAll('#nav button').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
document.getElementById('prevDay').addEventListener('click',()=>shiftDay(-1));
document.getElementById('nextDay').addEventListener('click',()=>shiftDay(1));
document.getElementById('datePicker').addEventListener('change',e=>{cur=e.target.value;renderAll();});
document.getElementById('menuBtn').addEventListener('click',openMenu);
document.getElementById('sheetBg').addEventListener('click',closeSheet);

renderAll();
if(isSessionActive())startElapsed();  // 앱 재시작 시 활성 세션의 경과시간 이어서 표시

/* ============ PWA 서비스워커 ============ */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>

<!-- ============ 클라우드 동기화 엔진 (supabase-js, 선택적) ============
  CLAUDE.md "의존성0/빌드0"의 유일 예외(플랜 6.1): 런타임 ESM CDN import 1개. 빌드/​npm은 여전히 0.
  버전 핀 고정(CDN 변동 방지). 초기화/네트워크 실패는 전부 try/catch + supa=null 가드로
  흡수 → 비로그인·미설정·오프라인이면 위 클래식 스크립트가 기존처럼 로컬 전용으로 100% 동작.
  ※ 이 블록은 type=module 이라 헤드리스 스모크(클래식 script 정확매칭)에서 실행되지 않음. -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

const SUPA_URL  = 'https://gjiyfgkswbzjfkibvwva.supabase.co';
const SUPA_ANON = 'sb_publishable_FYyY0rzyfbgxi2iIvUIQbQ_GtzDtarT';

// https 환경 + 설정값이 있을 때만 클라이언트 생성. 아니면 supa=null → 동기화 전부 no-op.
// auth 옵션 명시: 새로고침/앱 재실행에도 세션이 localStorage 에서 복원되고(persistSession),
// 토큰이 자동 갱신돼(autoRefreshToken) "한 번 로그인하면 계속 유지"되게 한다. (기본값이지만 명시)
let supa=null;
try{
  if(SUPA_URL && SUPA_ANON && location.protocol==='https:'){
    supa=createClient(SUPA_URL,SUPA_ANON,{
      auth:{
        persistSession:true,        // 세션을 storage 에 저장 → 재방문 시 복원
        autoRefreshToken:true,      // 만료 전 토큰 자동 갱신 → 장기 유지
        detectSessionInUrl:true,    // 매직링크 복귀 URL 해시에서 세션 추출
        storage:window.localStorage // 같은 origin 이면 새로고침/재실행에도 보존
      }
    });
  }
}catch(e){supa=null;}
window.supa=supa;  // viewCloudSync()의 cloudReady() 가 참조

const SYNC=window.SYNC;
let pushTimer=null;
const PUSH_DEBOUNCE=1500;

// 로컬 변경 시 디바운스 push. 경합 가드: push 직전 서버 updated_at 을 읽어
// 내 pulledAt 보다 최신이면(다른 기기가 먼저 씀) 먼저 pull/merge 후 다시 push 예약.
async function push(){
  if(!supa||!SYNC.enabled||!SYNC.session)return;
  try{
    const uid=SYNC.session.user.id;
    const {data:cur}=await supa.from('app_state').select('updated_at').eq('user_id',uid).maybeSingle();
    const pulledAt=window.getPulledAt();
    if(cur && pulledAt && Date.parse(cur.updated_at)>Date.parse(pulledAt)){
      await pull(); schedulePush(); return;            // 서버가 더 최신 → 먼저 pull
    }
    const nowIso=new Date().toISOString();
    const {error}=await supa.from('app_state')
      .upsert({user_id:uid,data:window.localSnapshot(),updated_at:nowIso});
    if(!error)window.setPulledAt(nowIso);
  }catch(e){/* 오프라인 등: 다음 save/포커스에서 재시도 */}
}
function schedulePush(){clearTimeout(pushTimer);pushTimer=setTimeout(push,PUSH_DEBOUNCE);}

// 원격 → 로컬 LWW 병합. 서버 행이 더 최신이면 로컬에 적용.
async function pull(){
  if(!supa||!SYNC.session)return;
  try{
    const uid=SYNC.session.user.id;
    const {data:row}=await supa.from('app_state').select('data,updated_at').eq('user_id',uid).maybeSingle();
    const localAt=window.getPulledAt();
    const merged=window.mergeStates(window.localSnapshot(), row?row.data:null, localAt, row?row.updated_at:null);
    if(merged.winner==='remote'){
      window.applyRemoteState(merged.data);
      window.setPulledAt(row.updated_at);
    }else if(row){
      // 로컬이 더 최신(또는 동률)이면 서버를 갱신해 둠
      window.setPulledAt(localAt||row.updated_at);
      schedulePush();
    }
  }catch(e){/* 네트워크 실패: 로컬 그대로 */}
}

// 매직링크 복귀 후 URL 해시(#access_token=... 등)를 정리해 새로고침 시 깔끔하게.
// 세션은 이미 localStorage 에 저장됐으므로 해시는 더 이상 필요 없다.
function cleanAuthHash(){
  try{
    if(location.hash && /access_token|error_description/.test(location.hash)){
      history.replaceState(null,'',location.pathname+location.search);
    }
  }catch(e){/* history 미가용 등 무시 */}
}

// 세션 수립/해제 처리. doPull=false 면 pull 없이 상태/UI 만 갱신(토큰 갱신 등 중복 pull 방지).
async function onSession(session,doPull){
  SYNC.session=session;
  if(session){
    SYNC.enabled=true;
    SYNC.email=session.user.email||null;
    SYNC.otpEmail=null;                 // 세션 수립 시 코드 입력 단계 종료
    if(doPull!==false)await pull();
  }else{
    SYNC.enabled=false;SYNC.email=null;
    SYNC.otpEmail=null;                 // 로그아웃 시 1단계(이메일 입력)로 복귀
    window.setPulledAt(null);
  }
  SYNC.onLocalChange=schedulePush;
  if(window.renderAll)window.renderAll();
}

// 클래식 스크립트의 UI(cloudLogin/cloudVerify/cloudLogout)가 부르는 진입점.
// 로그인은 2단계: (1) sendOtp=이메일로 6자리 코드 발송 (2) verifyOtp=코드 검증→세션.
// 매직링크 대신 OTP 코드: 앱 안에서 코드를 입력하므로 브라우저 전환이 없다(엉뚱한 브라우저로
// 링크가 열리는 문제 제거). emailRedirectTo 는 남겨둬 혹시 링크로 와도 detectSessionInUrl 로 동작.
SYNC.sendOtp=async (email)=>{
  if(!supa){window.toast&&window.toast('동기화를 사용할 수 없어요');return;}
  try{
    const {error}=await supa.auth.signInWithOtp({
      email, options:{shouldCreateUser:true, emailRedirectTo:location.origin+location.pathname}
    });
    if(error){window.toast&&window.toast('전송 실패: 잠시 후 다시');return;}
    SYNC.otpEmail=email;                 // 2단계(코드 입력) 진입
    window.toast&&window.toast('메일로 6자리 코드를 보냈어요 📧');
    if(window.renderAll)window.renderAll();
  }catch(e){window.toast&&window.toast('전송 실패: 잠시 후 다시');}
};
SYNC.verifyOtp=async (token)=>{
  if(!supa){window.toast&&window.toast('동기화를 사용할 수 없어요');return;}
  if(!SYNC.otpEmail){window.toast&&window.toast('먼저 인증코드를 받아주세요');return;}
  try{
    const {data,error}=await supa.auth.verifyOtp({email:SYNC.otpEmail, token, type:'email'});
    if(error||!(data&&data.session)){
      window.toast&&window.toast('코드가 올바르지 않아요. 다시 확인해주세요');return;
    }
    SYNC.otpEmail=null;                  // 검증 성공 → 입력 단계 종료
    await onSession(data.session);       // 기존 세션 흐름(동기화 켜짐)
    window.toast&&window.toast('로그인됐어요 ☁️');
  }catch(e){window.toast&&window.toast('코드 확인에 실패했어요. 잠시 후 다시');}
};
SYNC.logout=async ()=>{
  try{await supa.auth.signOut();}catch(e){}
  await onSession(null);
  window.toast&&window.toast('로그아웃했어요');
};

/* 사진 업로드(로그인 시에만 클래식 savePhoto 가 호출). 비공개 버킷 photos.
   경로 '<uid>/<kind>/<date>/<key>.jpg'(폴더단위 RLS). 성공 시 media 메타 INSERT 후 path 반환.
   실패는 throw → 호출부가 흡수(로컬 IndexedDB 사본은 이미 저장됨). */
SYNC.uploadPhoto=async (kind,date,key,c)=>{
  if(!supa||!SYNC.session)return null;
  const uid=SYNC.session.user.id;
  const path=uid+'/'+kind+'/'+date+'/'+key+'.jpg';
  const {error}=await supa.storage.from('photos').upload(path,c.blob,{upsert:true,contentType:'image/jpeg'});
  if(error)throw error;
  await supa.from('media').insert({user_id:uid,kind,ref_date:date,storage_path:path,
    width:c.width,height:c.height,bytes:c.bytes});
  return path;
};
/* 비공개 버킷이라 표시는 짧은 만료 signed URL(클래식 photoURL 이 캐시 미스 시 호출). */
SYNC.signedUrl=async (path)=>{
  if(!supa||!SYNC.session||!path)return null;
  const {data,error}=await supa.storage.from('photos').createSignedUrl(path,3600);
  return error?null:(data&&data.signedUrl);
};

// 초기화: 앱 로드 시 저장된 세션을 먼저 복원(일반 새로고침/앱 재실행에서도) +
// 매직링크 복귀(detectSessionInUrl) 및 토큰 갱신을 onAuthStateChange 로 처리.
if(supa){
  try{
    // getSession() 은 localStorage 에 저장된 세션을 복원한다. 해시가 없어도(=일반
    // 새로고침) 세션이 있으면 동기화가 켜진다 — 이것이 "로그인 유지"의 핵심.
    const {data}=await supa.auth.getSession();
    await onSession(data?data.session:null);
    cleanAuthHash();  // 매직링크로 들어온 경우 URL 해시 정리

    // 인증 상태 변화 구독: 로그인/토큰갱신은 SYNC 켜기, 로그아웃은 끄기.
    // TOKEN_REFRESHED 는 같은 세션이므로 중복 pull 을 피한다(doPull=false).
    supa.auth.onAuthStateChange((event,session)=>{
      if(event==='SIGNED_OUT'){ onSession(null); return; }
      const same=SYNC.session && session && SYNC.session.user.id===session.user.id;
      const doPull = (event==='SIGNED_IN') || !same;  // 신규 로그인/기기변경일 때만 pull
      onSession(session,doPull);
      cleanAuthHash();
    });
    // 탭 포커스 복귀 시 가벼운 pull(다른 기기 변경 반영).
    window.addEventListener('focus',()=>{if(SYNC.enabled)pull();});
  }catch(e){/* 초기화 실패해도 로컬 앱은 그대로 */}
}
</script>
