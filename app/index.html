<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2F4F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BULCUP">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>BULCUP</title>
<style>
:root{
  /* 배경/표면 */
  --bg:#F2F4F7; --surface:#FFFFFF; --surface2:#F7F8FA; --surface3:#EEF1F5;
  /* 라인 */
  --line:#E5E8EE; --line-soft:#EFF1F5; --dash:#C9D2E0;
  /* 텍스트 */
  --text:#1F2937; --text-strong:#111827; --muted:#6B7280; --faint:#9CA3AF;
  /* 강조 */
  --accent:#3B82F6; --accent-strong:#2563EB; --accent-soft:#E8F1FE; --on-accent:#FFFFFF;
  /* 보조/상태 */
  --good:#22C55E; --danger:#EF4444; --warn:#F59E0B; --gold:#F59E0B; --chip-dark:#2B3442;
  /* 호환 별칭(기존 코드의 --accent2 참조 유지) */
  --accent2:#3B82F6;
  /* 부위 색 매핑(라이트 톤) */
  --part-가슴:#EF4444; --part-등:#3B82F6; --part-어깨:#F59E0B; --part-팔:#8B5CF6;
  --part-하체:#22C55E; --part-복근:#06B6D4; --part-유산소:#EC4899; --part-기타:#6B7280;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:16px;line-height:1.45;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* layout */
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  padding:calc(var(--safe-top) + 14px) 16px 12px;border-bottom:1px solid var(--line)}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--text-strong)}
.title small{color:var(--muted);font-weight:600;font-size:12px;margin-left:6px}
.icon-btn{background:var(--surface);border:1px solid var(--line);color:var(--text);
  width:38px;height:38px;border-radius:10px;font-size:17px;display:grid;place-items:center}
.datebar{display:flex;align-items:center;gap:8px;margin-top:12px}
.datebar button{background:var(--surface);border:1px solid var(--line);color:var(--text);
  width:40px;height:40px;border-radius:10px;font-size:18px;font-weight:700}
.datebar .date-disp{flex:1;text-align:center;background:var(--surface);border:1px solid var(--line);
  border-radius:10px;height:40px;display:flex;align-items:center;justify-content:center;
  font-weight:700;position:relative}
.date-disp input{position:absolute;inset:0;opacity:0;width:100%;height:100%}
.date-disp .today-dot{color:var(--accent);font-size:11px;margin-left:6px;font-weight:700}

main{flex:1;padding:16px 16px calc(90px + var(--safe-bot));}

/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:flex;max-width:520px;margin:0 auto;padding-bottom:var(--safe-bot);
  box-shadow:0 -1px 2px rgba(16,24,40,.04)}
nav button{flex:1;background:none;border:none;color:var(--faint);padding:9px 0 10px;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700}
nav button .ico{font-size:21px;line-height:1}
nav button.active{color:var(--accent)}

/* cards & generic */
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;
  box-shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06)}
.card h2{margin:0 0 12px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--text-strong)}
.card h2 .tag{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600}
.muted{color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:14px}
.empty-ico{font-size:34px;line-height:1;margin-bottom:10px;opacity:.85}
.thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;background:var(--surface3);border:1px solid var(--line);cursor:pointer;flex-shrink:0}
.row{display:flex;gap:8px;align-items:center}
.spread{display:flex;justify-content:space-between;align-items:center}
label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600}
input[type=text],input[type=number],select,textarea{
  width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px 12px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:54px}
.btn{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 100%);color:var(--on-accent);border:none;border-radius:14px;
  padding:13px 16px;font-weight:800;font-size:15px;width:100%;box-shadow:0 4px 14px -4px var(--accent-strong)}
.btn:active{transform:translateY(1px);filter:brightness(.97)}
.btn.sec{background:var(--surface);color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:9px 12px;font-size:13px;width:auto;border-radius:11px}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--line);box-shadow:none}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:7px 14px;font-size:13px;font-weight:700;color:var(--muted)}
.chip.on{background:var(--accent-soft);color:var(--accent-strong);border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.x{color:var(--faint);background:none;border:none;font-size:18px;padding:0;
  min-width:40px;height:40px;display:inline-grid;place-items:center;border-radius:9px}
.x:active{background:var(--surface3)}
.divider{height:1px;background:var(--line);margin:12px 0}
.pill{display:inline-block;background:var(--surface2);border:1px solid var(--line);border-radius:8px;
  padding:3px 9px;font-size:12px;font-weight:600;margin:0 4px 4px 0;color:var(--text)}

/* workout exercise */
.ex{background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:10px}
.ex-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ex-head .name{font-weight:700;font-size:15px;flex:1}
.setline{display:grid;grid-template-columns:26px 1fr 1fr 36px auto;gap:7px;align-items:center;margin-bottom:6px;border-radius:9px;padding:2px}
.setline.set-done{background:var(--accent-soft)}
.setline .n{color:var(--muted);font-size:13px;font-weight:700;text-align:center}
.setline input{padding:9px 10px;text-align:center}
.set-unit{font-size:11px;color:var(--muted);text-align:center}
.set-check{width:30px;height:30px;border-radius:8px;border:2px solid var(--line);background:var(--surface2);
  display:grid;place-items:center;font-size:15px;color:transparent;cursor:pointer;padding:0}
.set-check.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
/* 세트 직전기록 고스트 */
.set-ghost{grid-column:1 / -1;font-size:11px;color:var(--faint);padding:0 0 4px 33px;margin-top:-3px}
/* 부위 배지 */
.part-badge{display:inline-block;font-size:11px;font-weight:700;border-radius:7px;padding:2px 8px;
  vertical-align:middle;margin-right:6px}
.part-dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex:none}
/* 운동 선택 시트 */
.ex-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.ex-row:last-child{border-bottom:none}
.ex-row .exn{flex:1;font-weight:600}
.ex-row .fav{background:none;border:none;font-size:18px;padding:0;width:40px;height:40px;
  display:grid;place-items:center;color:var(--faint)}
.ex-row .fav.on{color:var(--gold)}
.ex-list{max-height:46vh;overflow-y:auto;margin-top:4px}
.chiprow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.chiprow .chip{flex:none}
/* 내 루틴 카드 */
.rt-card{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--line);
  border-radius:13px;padding:12px;margin-bottom:8px;cursor:pointer}
.rt-card:active{filter:brightness(.98)}
.rt-card .rt-main{flex:1;min-width:0}
.rt-card .rt-name{font-weight:700;font-size:15px;color:var(--text-strong)}
.rt-card .rt-meta{font-size:12px;color:var(--muted);margin-top:2px}

/* habit */
.habit{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.habit:last-child{border-bottom:none}
.habit .hname{flex:1;font-weight:600}
.check{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);background:var(--surface2);
  display:grid;place-items:center;font-size:16px;color:transparent}
.check.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.stepper{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.stepper button{background:none;border:none;color:var(--text);width:34px;height:36px;font-size:18px;font-weight:700}
.stepper .val{min-width:46px;text-align:center;font-weight:700;font-size:15px}

/* body chart */
.metric{text-align:center;padding:6px}
.metric .v{font-size:22px;font-weight:800}
.metric .v small{font-size:12px;color:var(--muted);font-weight:600}
.metric .l{font-size:12px;color:var(--muted);margin-top:2px}
.delta{font-size:12px;font-weight:700}
.delta.up{color:var(--good)} .delta.down{color:var(--good)} .delta.bad{color:var(--danger)}
svg.chart{width:100%;height:140px;display:block;margin-top:6px}

/* summary home */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sum{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:13px}
.sum .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
.sum .v{font-size:20px;font-weight:800;margin-top:5px;color:var(--text-strong)}
.sum .v small{font-size:12px;color:var(--muted);font-weight:600}
/* 운동 종료 인사이트 */
.ins-celebrate{background:var(--accent-soft);color:var(--accent-strong);border-radius:14px;
  padding:12px;text-align:center;font-weight:800;font-size:15px;margin-bottom:12px}
.ins-card{margin:12px 0 0;padding:14px}
.ins-up{color:var(--good)}
.ins-down{color:var(--danger)}

/* 투데이 주간 날짜 스트립 */
/* 투데이 월 달력 */
.calbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.caltitle{font-size:16px;font-weight:800;color:var(--text-strong)}
.calnav{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  color:var(--text);font-size:20px;line-height:1;font-weight:700;cursor:pointer}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chead{text-align:center;font-size:11px;color:var(--faint);font-weight:700;padding-bottom:4px}
.cday{position:relative;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:none;border-radius:10px;cursor:pointer;padding:0}
.cday.empty{cursor:default}
.cday .cnum{font-size:14px;font-weight:700;color:var(--text);width:30px;height:30px;display:grid;place-items:center;border-radius:50%}
.cday.has-w .cnum{background:var(--accent-soft);color:var(--accent-strong)}
.cday.today .cnum{background:var(--accent);color:var(--on-accent)}
.cday.sel .cnum{box-shadow:inset 0 0 0 2px var(--accent)}
.cdots{display:flex;gap:3px;height:5px;align-items:center}
.cd{width:5px;height:5px;border-radius:50%;display:inline-block}
.cd.w{background:var(--accent)}
.cd.m{background:var(--warn)}
.callegend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:11px;color:var(--muted)}
.callegend span{display:inline-flex;align-items:center;gap:5px}
/* 주간 목표 진행바 */
.goalbar{height:12px;border-radius:999px;background:var(--surface3);overflow:hidden}
.goalfill{height:100%;border-radius:999px;background:var(--accent);transition:width .3s}
.goalfill.done{background:var(--good)}
.goalsteps{display:inline-flex;gap:5px}
.gstep{width:13px;height:13px;border-radius:50%;background:var(--surface3);border:1px solid var(--line);
  display:inline-block;cursor:pointer}
.gstep.tgt{background:var(--surface);border-color:var(--accent)}
.gstep.on{background:var(--accent);border-color:var(--accent)}

/* modal/toast */
.toast{position:fixed;bottom:calc(96px + var(--safe-bot));left:50%;transform:translateX(-50%);
  background:var(--text-strong);border:1px solid var(--text-strong);color:#fff;padding:11px 18px;
  border-radius:999px;font-size:14px;font-weight:600;z-index:50;opacity:0;transition:opacity .25s;
  pointer-events:none;max-width:90%;box-shadow:0 8px 24px -6px rgba(16,24,40,.4)}
.toast.show{opacity:1}
.sheet-bg{position:fixed;inset:0;background:rgba(16,24,40,.4);z-index:40;display:none}
.sheet-bg.show{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:520px;margin:0 auto;
  background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--line);
  padding:18px 16px calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform .25s;
  box-shadow:0 -8px 24px -6px rgba(16,24,40,.18)}
.sheet.show{transform:translateY(0)}
.sheet h3{margin:2px 0 14px;font-size:16px}
.fade{animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}

/* 운동 경과시간 바 (#view 밖 고정, 진행 중에만 표시) */
.elapsed-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + var(--safe-bot));
  z-index:32;max-width:520px;width:calc(100% - 32px);background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:9px 10px 9px 14px;display:none;align-items:center;gap:10px;
  box-shadow:0 8px 24px -6px rgba(16,24,40,.18)}
.elapsed-bar.show{display:flex}
.elapsed-label{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap}
.elapsed-time{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-strong);
  min-width:56px;flex:1}
.elapsed-end{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 100%);color:var(--on-accent);border:none;
  border-radius:11px;padding:9px 14px;font-weight:800;font-size:14px;white-space:nowrap;
  box-shadow:0 4px 14px -4px var(--accent-strong)}
.elapsed-end:active{transform:translateY(1px);filter:brightness(.97)}

/* 휴식 타이머 */
.rest-fab{position:fixed;right:16px;bottom:calc(86px + var(--safe-bot));z-index:30;
  width:54px;height:54px;border-radius:50%;background:var(--surface);border:1px solid var(--line);
  color:var(--text);font-size:24px;box-shadow:0 8px 24px -6px rgba(16,24,40,.18);display:none;place-items:center}
.rest-fab.show{display:grid}
.rest-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + var(--safe-bot));
  z-index:31;max-width:300px;width:calc(100% - 32px);background:var(--accent);color:var(--on-accent);
  border-radius:14px;padding:11px 16px;display:none;align-items:center;gap:10px;font-weight:800;
  box-shadow:0 8px 24px -6px rgba(16,24,40,.28)}
.rest-bar.show{display:flex}
.rest-bar.warn{background:var(--danger)}
.rest-time{font-size:22px;font-variant-numeric:tabular-nums;min-width:62px}
.rest-label{flex:1;font-size:14px;opacity:.85}
.rest-x{background:rgba(255,255,255,.22);border:none;color:var(--on-accent);width:30px;height:30px;border-radius:8px;font-size:15px;font-weight:800}
.rest-bar.done{animation:restflash .5s ease 3}
@keyframes restflash{0%,100%{background:var(--accent)}50%{background:var(--good)}}

/* 인터벌 타이머(유산소/HIIT) — 휴식 타이머와 별개의 고정 오버레이 */
.iv-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + var(--safe-bot));
  z-index:31;max-width:340px;width:calc(100% - 32px);background:var(--good);color:#fff;
  border-radius:14px;padding:11px 16px;display:none;align-items:center;gap:10px;font-weight:800;
  box-shadow:0 8px 24px -6px rgba(16,24,40,.28)}
.iv-bar.show{display:flex}
.iv-bar.rest{background:var(--accent)}
.iv-bar.done{background:var(--gold)}
.iv-time{font-size:22px;font-variant-numeric:tabular-nums;min-width:54px}
.iv-info{flex:1;display:flex;flex-direction:column;line-height:1.2}
.iv-phase{font-size:14px}
.iv-round{font-size:11px;opacity:.85;font-weight:700}
.iv-x{background:rgba(255,255,255,.22);border:none;color:#fff;width:30px;height:30px;border-radius:8px;font-size:15px;font-weight:800}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="head-row">
      <div class="title" id="tabTitle">홈 <small id="streakLbl"></small></div>
      <button class="icon-btn" id="menuBtn" aria-label="메뉴">⚙</button>
    </div>
    <div class="datebar" id="datebar">
      <button id="prevDay" aria-label="이전 날">‹</button>
      <div class="date-disp" id="dateDisp">
        <span id="dateText"></span>
        <input type="date" id="datePicker">
      </div>
      <button id="nextDay" aria-label="다음 날">›</button>
    </div>
  </header>

  <main id="view"></main>

  <nav id="nav">
    <button data-tab="home" class="active"><span class="ico">📅</span>투데이</button>
    <button data-tab="workout"><span class="ico">🏋️</span>운동</button>
    <button data-tab="stats"><span class="ico">📊</span>분석</button>
    <button data-tab="me"><span class="ico">👤</span>프로필</button>
  </nav>
</div>

<!-- 운동 경과시간 바 (재렌더링과 무관한 #view 밖 고정 오버레이) -->
<div class="elapsed-bar" id="elapsedBar">
  <span class="elapsed-label">⏱ 운동 시간</span>
  <span class="elapsed-time" id="elapsedTime">0:00</span>
  <button class="elapsed-end" onclick="endSession()">운동 종료</button>
</div>

<!-- 휴식 타이머 (재렌더링과 무관하게 유지되는 고정 오버레이) -->
<button class="rest-fab" id="restFab" onclick="openRestPicker()" aria-label="휴식 타이머">⏱</button>
<div class="rest-bar" id="restBar" onclick="openRestPicker()">
  <span class="rest-time" id="restTime">0:00</span>
  <span class="rest-label">휴식 중</span>
  <button class="rest-x" onclick="event.stopPropagation();stopRest()" aria-label="정지">✕</button>
</div>

<!-- 인터벌 타이머 바 (재렌더링과 무관한 #view 밖 고정 오버레이) -->
<div class="iv-bar" id="ivBar" onclick="openIntervalPicker()">
  <span class="iv-time" id="ivTime">0:00</span>
  <span class="iv-info"><span class="iv-phase" id="ivPhaseLbl">운동</span><span class="iv-round" id="ivRoundLbl">1/8</span></span>
  <button class="iv-x" onclick="event.stopPropagation();stopInterval()" aria-label="정지">✕</button>
</div>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ 저장소 ============ */
const KEY='momzzang_v1';
const DEFAULT={
  workouts:{}, meals:{}, habits:{}, body:[], sessions:{}, exDB:[], routines:[],
  habitDefs:[
    {id:'sleep', name:'수면', type:'num', unit:'시간', step:0.5, icon:'😴'},
    {id:'water', name:'물', type:'num', unit:'컵', step:1, icon:'💧'},
    {id:'protein', name:'단백질 챙김', type:'check', icon:'🥩'},
    {id:'stretch', name:'스트레칭', type:'check', icon:'🧘'},
    {id:'nojunk', name:'야식·정크 안 먹기', type:'check', icon:'🚫'}
  ],
  settings:{}
};
let DB=load();
function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r)return Object.assign(structuredClone(DEFAULT),r);}catch(e){}
  return structuredClone(DEFAULT);
}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));if(typeof SYNC!=='undefined'&&SYNC.enabled)SYNC.onLocalChange();}

/* ============ 클라우드 동기화 (로컬 우선) ============
   원칙: supa(아래 module 블록)가 없거나 비로그인이면 SYNC.enabled=false →
   save()의 훅도 no-op, 네트워크 0, 기존 로컬 전용 동작 100% 동일.
   모델: app_state(user_id,data jsonb,updated_at) 단일 행 LWW(플랜 2.2/2.3).
   이 클래식 스크립트엔 "순수 로직 + 로컬 적용"만 둔다(헤드리스 테스트 대상).
   실제 네트워크/인증은 아래 type=module 블록의 supabase-js 가 담당. */
const SYNC={
  enabled:false,        // 로그인+supa 준비됐을 때만 module이 true로
  email:null,           // 로그인된 이메일(상태표시용)
  onLocalChange(){},    // module이 debounce push 핸들러로 교체
  otpEmail:null,        // OTP 코드 발송 중인 이메일(2단계 입력 대기). null이면 1단계(이메일 입력).
};
window.SYNC=SYNC;        // module(supabase-js) 블록에서 참조하도록 노출(const는 자동 전역 아님)
const PULLED_KEY='sync_pulledAt';
/* 순수 함수: 단일 행 전체상태 Last-Write-Wins 병합.
   localAt/remoteAt 은 ISO 문자열 또는 ms 숫자(없으면 0). 더 최신 쪽을 통째로 채택.
   동률이면 로컬 유지(불필요한 덮어쓰기 방지). 반환: {data, winner:'local'|'remote'}. */
function mergeStates(local,remote,localAt,remoteAt){
  const lt=local? (Date.parse(localAt)||+localAt||0) : -1;
  const rt=remote? (Date.parse(remoteAt)||+remoteAt||0) : -1;
  if(remote && rt>lt) return {data:remote, winner:'remote'};
  return {data:local, winner:'local'};
}
/* 원격 pull 결과를 로컬에 적용(로그인 시 module이 호출).
   재푸시 루프를 막기 위해 SYNC.enabled 를 잠시 끄고 save() → 다시 켠다. */
function applyRemoteState(data){
  if(!data||typeof data!=='object')return;
  const was=SYNC.enabled;SYNC.enabled=false;
  DB=Object.assign(structuredClone(DEFAULT),data);
  save();
  SYNC.enabled=was;
  if(isSessionActive())startElapsed();else stopElapsed();
  renderAll();
}
/* module이 push 할 현재 로컬 상태 스냅샷. */
function localSnapshot(){return structuredClone(DB);}
function getPulledAt(){return localStorage.getItem(PULLED_KEY);}
function setPulledAt(v){if(v==null)localStorage.removeItem(PULLED_KEY);else localStorage.setItem(PULLED_KEY,String(v));}

/* ============ 사진(미디어) — 로컬 우선(IndexedDB) + 선택적 Storage ============
   원칙(플랜 4절): 사진 원본은 IndexedDB(bulcup_media)에 항상 저장 → 오프라인·비로그인에서도 동작.
   로그인(cloudReady) 일 때만 module 블록이 Storage 업로드 + media 메타 INSERT 수행.
   표시는 IndexedDB 캐시 우선, 없으면 signed URL fetch 후 캐시(무료 egress 방어).
   localStorage 엔 사진을 절대 안 넣는다(5MB 한계) — DB엔 메타(키·치수·경로)만. */
const MEDIA_DB='bulcup_media', MEDIA_STORE='blobs';
let _mediaDbP=null;
function mediaDB(){
  if(_mediaDbP)return _mediaDbP;
  _mediaDbP=new Promise((res,rej)=>{
    if(typeof indexedDB==='undefined'){rej(new Error('no idb'));return;}
    const req=indexedDB.open(MEDIA_DB,1);
    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(MEDIA_STORE))db.createObjectStore(MEDIA_STORE);};
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
  return _mediaDbP;
}
function idbPut(key,blob){return mediaDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(MEDIA_STORE,'readwrite');tx.objectStore(MEDIA_STORE).put(blob,key);
  tx.oncomplete=()=>res(key);tx.onerror=()=>rej(tx.error);}));}
function idbGet(key){return mediaDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(MEDIA_STORE,'readonly');const r=tx.objectStore(MEDIA_STORE).get(key);
  r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);}));}
function idbDel(key){return mediaDB().then(db=>new Promise((res)=>{
  const tx=db.transaction(MEDIA_STORE,'readwrite');tx.objectStore(MEDIA_STORE).delete(key);
  tx.oncomplete=()=>res();tx.onerror=()=>res();}));}

/* 캔버스 압축(의존성0): 긴 변을 max 픽셀로 축소 후 JPEG 인코딩.
   반환: {blob, width, height, bytes}. 입력보다 작아지는 게 목표(egress·용량 절감). */
const PHOTO_MAX=1000, PHOTO_QUALITY=0.78;
function fitDims(w,h,max){
  if(w<=max&&h<=max)return {w,h};
  const s=w>=h? max/w : max/h;
  return {w:Math.round(w*s), h:Math.round(h*s)};
}
function compressImage(file,max,quality){
  max=max||PHOTO_MAX;quality=quality==null?PHOTO_QUALITY:quality;
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      try{
        const d=fitDims(img.naturalWidth||img.width, img.naturalHeight||img.height, max);
        const cv=document.createElement('canvas');cv.width=d.w;cv.height=d.h;
        cv.getContext('2d').drawImage(img,0,0,d.w,d.h);
        cv.toBlob(b=>{URL.revokeObjectURL(url);
          if(!b){rej(new Error('encode failed'));return;}
          res({blob:b,width:d.w,height:d.h,bytes:b.size});
        },'image/jpeg',quality);
      }catch(e){URL.revokeObjectURL(url);rej(e);}
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('load failed'));};
    img.src=url;
  });
}

/* 순수: 새 사진의 로컬 키와 Storage 경로(uid 채워질 자리). */
function uid4(){return (typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID()
  :'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==='x'?r:(r&0x3|0x8)).toString(16);});}
/* media 메타 구조 생성. kind:'meal'|'body', date:'YYYY-MM-DD'.
   localKey 는 IndexedDB 키이자(로그인 시) Storage 경로의 파일명 베이스.
   path 는 '<uid>/<kind>/<date>/<key>.jpg' (최상위 폴더 uid → 폴더단위 RLS). */
function buildPhotoMeta(kind,date,dims){
  const key=uid4();
  return {id:key, kind, date, w:dims&&dims.width||null, h:dims&&dims.height||null,
    bytes:dims&&dims.bytes||null};
}
function storagePath(uid,kind,date,key){return uid+'/'+kind+'/'+date+'/'+key+'.jpg';}

/* 사진 한 장 저장 흐름: 항상 IndexedDB에 먼저 넣고, 로그인 시에만 Storage 업로드.
   반환: 식단/신체 레코드에 붙일 메타(photo 필드). 업로드 실패해도 로컬 메타는 유효. */
async function savePhoto(kind,date,file){
  const c=await compressImage(file);
  const meta=buildPhotoMeta(kind,date,c);
  await idbPut(meta.id,c.blob);                 // 로컬 우선: 오프라인·비로그인에서도 보존
  // 로그인 시에만 업로드(네트워크). 비로그인이면 no-op → 네트워크 0.
  if(cloudReady()&&SYNC.enabled&&SYNC.uploadPhoto){
    try{const path=await SYNC.uploadPhoto(kind,date,meta.id,c);if(path)meta.path=path;}catch(e){}
  }
  return meta;
}
/* 표시용 objectURL: IndexedDB 캐시 우선, 없고 로그인+경로 있으면 signed URL fetch 후 캐시. */
async function photoURL(meta){
  if(!meta)return null;
  try{
    let blob=await idbGet(meta.id);
    if(!blob && meta.path && cloudReady() && SYNC.signedUrl){
      const u=await SYNC.signedUrl(meta.path);
      if(u){const r=await fetch(u);blob=await r.blob();idbPut(meta.id,blob).catch(()=>{});}
    }
    return blob?URL.createObjectURL(blob):null;
  }catch(e){return null;}
}
/* 화면의 <img data-photo="id"> 들을 비동기로 채운다(렌더 후 호출). */
function hydratePhotos(){
  document.querySelectorAll('img[data-photo]').forEach(img=>{
    if(img.dataset.loaded)return;img.dataset.loaded='1';
    const meta={id:img.dataset.photo, path:img.dataset.path||null};
    photoURL(meta).then(u=>{if(u)img.src=u;else img.closest('[data-photo-wrap]')&&(img.closest('[data-photo-wrap]').style.display='none');});
  });
}
/* 전체화면 사진 뷰어(시트 재사용). */
function viewPhoto(id,path){
  openSheet(`<div style="text-align:center"><img data-photo="${esc(id)}" ${path?`data-path="${esc(path)}"`:''} data-photo-wrap style="max-width:100%;max-height:70vh;border-radius:12px" alt="사진">
    <div style="margin-top:12px"><button class="btn sec" onclick="closeSheet()">닫기</button></div></div>`);
  hydratePhotos();
}

/* ============ 운동 마스터(부위별) ============ */
const PARTS=['가슴','등','어깨','팔','하체','복근','유산소'];
/* 시드: 부위별 대표 운동. 사용자 추가분(DB.exDB)과 병합해서 사용. */
const EX_SEED=[
  ['가슴',['벤치프레스','인클라인벤치','덤벨프레스','체스트플라이','딥스','푸시업']],
  ['등',['데드리프트','랫풀다운','바벨로우','시티드로우','풀업','티바로우']],
  ['어깨',['오버헤드프레스','사이드 레터럴 레이즈','페이스풀','리어델트 플라이','아놀드 프레스']],
  ['팔',['바벨컬','덤벨컬','해머컬','케이블푸시다운','라잉 익스텐션','프리처컬']],
  ['하체',['스쿼트','레그프레스','레그 익스텐션','레그 컬','루마니안 데드리프트','런지','카프레이즈']],
  ['복근',['크런치','행잉 레그레이즈','플랭크','케이블 크런치']],
  ['유산소',['러닝','사이클','로잉','인터벌']]
].flatMap(([part,names])=>names.map(name=>({id:'ex_'+part+'_'+name,name,part,fav:false})));
/* 시드 + 사용자 추가분 병합(이름 기준 사용자분 우선). */
function allEx(){
  const map={};EX_SEED.forEach(e=>map[e.name]={...e});
  (DB.exDB||[]).forEach(e=>{map[e.name]={...(map[e.name]||{}),...e};});
  return Object.values(map);
}
/* 운동 이름 → 부위. 마스터에 없으면 '기타'. 레거시 종목 폴백. */
function partOf(name){const e=allEx().find(x=>x.name===name);return (e&&e.part)||'기타';}
/* 즐겨찾기 여부(사용자분 우선). */
function isFav(name){const u=(DB.exDB||[]).find(e=>e.name===name);if(u&&u.fav!=null)return !!u.fav;
  const s=EX_SEED.find(e=>e.name===name);return !!(s&&s.fav);}
function toggleFav(name){if(!DB.exDB)DB.exDB=[];
  let u=DB.exDB.find(e=>e.name===name);
  if(!u){u={id:'ex_u'+Date.now(),name,part:partOf(name),fav:false};DB.exDB.push(u);}
  u.fav=!isFav(name);save();}

/* ============ 날짜 ============ */
function ymd(d){const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
let cur=ymd(new Date());
const DOW=['일','월','화','수','목','금','토'];
function fmtDate(s){const d=new Date(s+'T00:00');const t=ymd(new Date());
  const diff=Math.round((new Date(s+'T00:00')-new Date(t+'T00:00'))/86400000);
  let rel='';if(diff===0)rel=' <span class="today-dot">오늘</span>';else if(diff===-1)rel=' <span class="muted" style="font-size:11px">어제</span>';
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`+rel;}
function shiftDay(n){const d=new Date(cur+'T00:00');d.setDate(d.getDate()+n);cur=ymd(d);renderAll();}

/* ============ 탭 ============ */
let tab='home';
const TITLES={home:'BULCUP',workout:'운동',stats:'분석',me:'프로필'};
function setTab(t){tab=t;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.getElementById('datebar').style.display = (t==='home'||t==='workout')?'flex':'none';
  renderAll();showRestBar();showIntervalBar();}

function renderAll(){
  document.getElementById('dateText').innerHTML=fmtDate(cur);
  document.getElementById('datePicker').value=cur;
  document.getElementById('tabTitle').firstChild.textContent=TITLES[tab]+' ';
  document.getElementById('streakLbl').textContent = tab==='home'? streakLabel() : '';
  const v=document.getElementById('view');v.className='fade';
  if(tab==='home')v.innerHTML=viewHome();
  else if(tab==='workout')v.innerHTML=viewWorkout();
  else if(tab==='stats')v.innerHTML=viewStats();
  else if(tab==='me')v.innerHTML=viewMe();
  if(tab==='home'||tab==='stats')drawChart();
  hydratePhotos();
  showElapsed();
}

/* ============ 홈 ============ */
function streakLabel(){
  let n=0;const d=new Date();
  while(true){const k=ymd(d);if(dayLogged(k)){n++;d.setDate(d.getDate()-1);}else break;if(n>999)break;}
  return n>0?`🔥 ${n}일 연속`:'';
}
function dayLogged(k){
  return (DB.workouts[k]&&DB.workouts[k].length)|| (DB.meals[k]&&DB.meals[k].length)||
    (DB.habits[k]&&Object.keys(DB.habits[k]).length);
}
/* 기록 판정(달력 마커용): 운동=강조 점, 식단=보조 점 */
function dayHasWorkout(k){return !!(DB.workouts[k]&&DB.workouts[k].length);}
function dayHasMeal(k){return !!(DB.meals[k]&&DB.meals[k].length);}
/* 주간 목표(주 n회). 신규 설정이라 항상 기본값 폴백. */
function weeklyGoal(){const g=DB.settings&&DB.settings.weeklyGoal;return (g&&g>0)?g:4;}
function setWeeklyGoal(n){n=Math.max(1,Math.min(7,n|0));DB.settings.weeklyGoal=n;save();renderAll();}
/* 이번 주(cur 기준 일~토) 운동한 날 수 */
function weekWorkoutDays(){return weekKeys(0).filter(dayHasWorkout).length;}

/* 투데이 월 달력 — 현재 보는 달은 calMonth(offset, 0=오늘 달) 기준 */
let calMonth=0;
function calShift(n){calMonth+=n;renderAll();}
function viewCalendar(){
  const now=new Date();
  const anchor=new Date(now.getFullYear(),now.getMonth()+calMonth,1);
  const y=anchor.getFullYear(),m=anchor.getMonth();
  const today=ymd(now);
  const first=new Date(y,m,1);const lead=first.getDay(); // 1일 앞 빈칸(일요일 시작)
  const days=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<lead;i++)cells+=`<div class="cday empty"></div>`;
  for(let day=1;day<=days;day++){
    const k=ymd(new Date(y,m,day));
    const cls=['cday'];
    if(k===today)cls.push('today');
    if(k===cur)cls.push('sel');
    const w=dayHasWorkout(k),me=dayHasMeal(k);
    if(w)cls.push('has-w');
    const dots=`<span class="cdots">${w?'<i class="cd w"></i>':''}${me?'<i class="cd m"></i>':''}</span>`;
    cells+=`<button class="${cls.join(' ')}" onclick="goDate('${k}')"><span class="cnum">${day}</span>${dots}</button>`;
  }
  const head=DOW.map(d=>`<div class="chead">${d}</div>`).join('');
  return `<div class="card">
    <div class="calbar">
      <button class="calnav" onclick="calShift(-1)" aria-label="이전 달">‹</button>
      <div class="caltitle">${y}년 ${m+1}월</div>
      <button class="calnav" onclick="calShift(1)" aria-label="다음 달">›</button>
    </div>
    <div class="calgrid">${head}${cells}</div>
    <div class="callegend"><span><i class="cd w"></i> 운동</span><span><i class="cd m"></i> 식단</span></div>
  </div>`;
}
/* 주간 목표 진행바 */
function viewWeeklyGoal(){
  const goal=weeklyGoal(),done=weekWorkoutDays();
  const pct=Math.min(100,Math.round(done/goal*100));
  const reached=done>=goal;
  return `<div class="card">
    <h2>🎯 주간 목표 <span class="tag">주 ${goal}회</span></h2>
    <div class="goalbar"><div class="goalfill${reached?' done':''}" style="width:${pct}%"></div></div>
    <div class="row" style="justify-content:space-between;margin-top:8px">
      <span class="muted" style="font-size:13px">${reached?'이번 주 목표 달성! 🔥':`이번 주 <b style="color:var(--text)">${done}</b> / ${goal}회 운동`}</span>
      <span class="goalsteps">${[1,2,3,4,5,6,7].map(n=>`<i class="gstep${n<=goal?(n<=done?' on':' tgt'):''}" onclick="setWeeklyGoal(${n})" title="주 ${n}회 목표"></i>`).join('')}</span>
    </div>
  </div>`;
}
function goDate(k){cur=k;renderAll();}

/* 오늘 체중 빠른 기록(투데이). 기존 DB.body에 cur 날짜로 저장(같은날 갱신).
   이미 기록돼 있으면 그 값을 보여주고 수정할 수 있게 한다. */
function viewTodayWeight(){
  const todayRec=DB.body.find(b=>b.date===cur);
  const has=todayRec&&todayRec.weight!=null;
  // 직전(현재 날짜 이전) 체중 — 변화량 안내용
  const prevArr=[...DB.body].filter(b=>b.weight!=null&&b.date<cur).sort((a,b)=>a.date<b.date?-1:1);
  const prev=prevArr[prevArr.length-1];
  let delta='';
  if(has&&prev){const d=Math.round((todayRec.weight-prev.weight)*10)/10;
    if(d!==0)delta=`<span class="delta ${d<0?'down':'bad'}" style="font-size:13px">${d<0?'▼':'▲'} ${Math.abs(d)}kg</span>`;}
  return `<div class="card"><h2>⚖️ 오늘 체중 ${has?`<span class="tag">기록됨</span>`:''}</h2>
    <div class="row" style="gap:8px;align-items:flex-end">
      <div style="flex:1"><input type="number" inputmode="decimal" id="todayW" placeholder="${has?todayRec.weight:'오늘 체중 (kg)'}" value="${has?todayRec.weight:''}"></div>

}

/* ============ 분석 ============ */
function weekKeys(offset){ // offset 주 전 (0=이번 주) 의 일~토 7일 키
  const base=new Date(cur+'T00:00');
  const start=new Date(base);start.setDate(start.getDate()-base.getDay()-offset*7);
  const ks=[];for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);ks.push(ymd(d));}
  return ks;
}
/* ----- 분석 집계(순수 함수, 테스트 용이) -----
   모두 기존 DB.workouts/body 만 읽는다(백업 호환 무관). */
/* 한 주(offset)의 운동한 날 수(중복일 1회). */
function weekWorkoutDayCount(offset){return weekKeys(offset).filter(k=>DB.workouts[k]&&DB.workouts[k].length).length;}
/* 한 주(offset)의 총 볼륨(무게×횟수 합). */
function weekVolume(offset){return weekKeys(offset).reduce((s,k)=>s+workoutVolume(DB.workouts[k]||[]),0);}
/* 최근 n주 [n-1주전 … 이번주] 의 {days,vol} 시계열. */
function recentWeeklyStats(n){
  const out=[];for(let i=n-1;i>=0;i--)out.push({days:weekWorkoutDayCount(i),vol:weekVolume(i)});
  return out; // 인덱스 0=가장 과거, 마지막=이번주
}
/* 최근 weeks주(이번주 포함)의 부위별 볼륨 합. PARTS+기타 모두 0 포함. */
function partVolume(weeks){
  const totals={};PARTS.forEach(p=>totals[p]=0);totals['기타']=0;
  for(let i=0;i<weeks;i++){weekKeys(i).forEach(k=>{
    (DB.workouts[k]||[]).forEach(ex=>{
      const part=ex.part||partOf(ex.name);const key=(part in totals)?part:'기타';
      let v=0;(ex.sets||[]).forEach(s=>{v+=(+s.weight||0)*(+s.reps||0);});
      totals[key]+=v;
    });
  });}
  Object.keys(totals).forEach(k=>totals[k]=Math.round(totals[k]));
  return totals;
}
function viewStats(){
  // 이번 주 집계
  const days=weekWorkoutDayCount(0);
  const wkVol=weekVolume(0);
  // 최근 8주 시계열(횟수·볼륨)
  const series=recentWeeklyStats(8);
  const maxC=Math.max(1,...series.map(s=>s.days));
  const maxV=Math.max(1,...series.map(s=>s.vol));
  const lbl=i=>i===0?'8주전':(i===7?'이번주':'');
  const freqBars=series.map((s,i)=>{const h=Math.round(s.days/maxC*70);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;display:flex;align-items:flex-end;height:74px"><div title="${s.days}일" style="width:100%;height:${h}px;min-height:3px;background:${i===7?'var(--accent)':'var(--surface3)'};border-radius:6px"></div></div>
      <div class="muted" style="font-size:10px">${lbl(i)}</div></div>`;}).join('');
  const volBars=series.map((s,i)=>{const h=Math.round(s.vol/maxV*70);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;display:flex;align-items:flex-end;height:74px"><div title="${(s.vol/1000).toFixed(1)}t" style="width:100%;height:${h}px;min-height:3px;background:${i===7?'var(--good)':'var(--surface3)'};border-radius:6px"></div></div>
      <div class="muted" style="font-size:10px">${lbl(i)}</div></div>`;}).join('');
  // 부위별 볼륨 분포(최근 4주)
  const pv=partVolume(4);
  const pvTotal=Object.values(pv).reduce((a,b)=>a+b,0);
  const pvRows=PARTS.concat(pv['기타']>0?['기타']:[])
    .map(p=>({p,v:pv[p]||0})).filter(o=>o.v>0).sort((a,b)=>b.v-a.v);
  // 총 누적
  let totalDays=0,totalVol=0;
  for(const k in DB.workouts){if(DB.workouts[k].length){totalDays++;totalVol+=workoutVolume(DB.workouts[k]);}}
  // 3대 추정 1RM(현황)
  const big=bigThree();const bigTotal=Math.round(big.reduce((s,b)=>s+b.oneRM,0)*10)/10;
  const maxRM=Math.max(1,...big.map(b=>b.oneRM));
  // 체중 간단 요약(현재·변화)
  const body=[...DB.body].filter(b=>b.weight!=null).sort((a,b)=>a.date<b.date?-1:1);
  const last=body[body.length-1];const first=body[0];
  const wDelta=(last&&first&&last!==first)?Math.round((last.weight-first.weight)*10)/10:null;

  // 데이터 전무 시 빈 상태 안내
  if(!totalDays && !last){
    return `<div class="card"><h2>📊 분석</h2>
      <div class="empty"><div class="empty-ico">📊</div>아직 분석할 기록이 없어요.<br>운동을 기록하면 부위별 볼륨·주간 추이·3대 1RM이 여기에 쌓여요. 💪</div>
      <button class="btn" onclick="setTab('workout')">운동 기록하러 가기</button></div>`;
  }

  let html=`<div class="card"><h2>📊 이번 주 요약</h2>
    <div class="sum-grid">
      <div class="sum"><div class="k">🏋️ 운동한 날</div><div class="v">${days}<small>/7 일</small></div></div>
      <div class="sum"><div class="k">📦 주간 볼륨</div><div class="v">${wkVol.toLocaleString()}<small> kg</small></div></div>
    </div>
    <div class="muted" style="font-size:13px;margin-top:10px">${days?`이번 주 <b style="color:var(--text)">${days}회</b> 운동, 총 <b style="color:var(--text)">${(wkVol/1000).toFixed(1)}톤</b>을 들었어요. 꾸준함이 근육보다 먼저 자랍니다. 💪`:'이번 주는 아직 기록이 없어요. 가볍게 한 세트부터!'}</div>
  </div>`;

  // 부위별 볼륨 분포(최근 4주)
  html+=`<div class="card"><h2>💪 부위별 볼륨 <span class="tag">최근 4주</span></h2>`;
  if(!pvRows.length){
    html+=`<div class="empty">최근 4주 운동 기록이 없어요.</div>`;
  }else{
    html+=pvRows.map(o=>{const pct=Math.round(o.v/pvTotal*100);
      return `<div style="margin-bottom:10px">
        <div class="spread" style="font-size:13px;margin-bottom:4px">
          <span style="font-weight:700"><span class="part-dot" style="background:var(--part-${o.p});margin-right:6px;vertical-align:middle"></span>${o.p}</span>
          <span class="muted">${(o.v/1000).toFixed(1)}t · ${pct}%</span></div>
        <div class="goalbar"><div class="goalfill" style="width:${pct}%;background:var(--part-${o.p})"></div></div>
      </div>`;}).join('');
  }
  html+=`</div>`;

  // 3대 추정 1RM 현황
  if(bigTotal>0){
    html+=`<div class="card"><h2>🏋️ 3대 추정 1RM <span class="tag">TOTAL ${bigTotal.toLocaleString()}kg</span></h2>`;
    html+=big.map(b=>{const pct=b.oneRM>0?Math.round(b.oneRM/maxRM*100):0;
      return `<div style="margin-bottom:10px">
        <div class="spread" style="font-size:13px;margin-bottom:4px">
          <span style="font-weight:700">${b.label}</span>
          <span class="muted">${b.oneRM>0?b.oneRM+'kg':'기록 없음'}</span></div>
        <div class="goalbar"><div class="goalfill" style="width:${pct}%"></div></div>
      </div>`;}).join('');
    html+=`<div class="muted" style="font-size:11px;text-align:center;margin-top:4px">Epley 공식: 무게 × (1 + 횟수/30)</div></div>`;
  }

  // 주간 운동 빈도 추이
  html+=`<div class="card"><h2>📈 최근 8주 운동 횟수</h2>
    <div class="row" style="align-items:flex-end;gap:5px">${freqBars}</div></div>`;
  // 총 볼륨 추이
  html+=`<div class="card"><h2>📦 최근 8주 총 볼륨</h2>
    <div class="row" style="align-items:flex-end;gap:5px">${volBars}</div>
    <div class="muted" style="font-size:11px;text-align:center;margin-top:6px">막대 높이 = 그 주 볼륨(무게×횟수 합)</div></div>`;

  // 누적 기록
  html+=`<div class="card"><h2>🏆 누적 기록</h2>
    <div class="sum-grid">
      <div class="sum"><div class="k">총 운동일</div><div class="v">${totalDays}<small> 일</small></div></div>
      <div class="sum"><div class="k">총 볼륨</div><div class="v">${(totalVol/1000).toFixed(1)}<small> 톤</small></div></div>
    </div>`;
  // 체중 간단 요약(현재·변화). 상세 추이는 투데이 신체 차트에.
  if(last){
    const dtxt=wDelta==null?'':(wDelta===0?'± 0kg':(wDelta<0?'▼ '+Math.abs(wDelta)+'kg':'▲ '+wDelta+'kg'));
    html+=`<div class="divider"></div>
      <div class="spread" style="font-size:13px">
        <span class="muted">⚖️ 체중 <span style="font-size:11px">(${last.date})</span></span>
        <span style="font-weight:700">${last.weight}kg ${dtxt?`<span class="muted" style="font-size:12px">기록 시작 대비 ${dtxt}</span>`:''}</span></div>
      <div class="muted" style="font-size:11px;margin-top:4px">자세한 체중·체지방 추이는 투데이 → 신체 카드에서 볼 수 있어요.</div>`;
  }
  html+=`</div>`;
  return html;
}

/* 클라우드 동기화 카드. 세 상태: (a)미설정/불가 → 안내만 (b)미로그인 → 이메일 입력
   (c)로그인됨 → 상태표시+로그아웃. 비활성 경로는 네트워크 0(로컬 우선 불변). */
function cloudReady(){return typeof supa!=='undefined' && !!supa;}

      <div class="row" style="gap:8px">
        <input type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" id="cloudCode" placeholder="000000">
        <button class="btn sm" style="white-space:nowrap" onclick="cloudVerify()">확인</button>
      </div>
      <div class="row" style="gap:8px;margin-top:8px">
        <button class="btn sec sm" onclick="cloudResend()">코드 재전송</button>

/* 아래 핸들러들은 module(supa)이 제공하는 SYNC.sendOtp/SYNC.verifyOtp/SYNC.logout 로 위임.

/* ============ 운동일지 ============ */
function workoutVolume(list){let v=0;(list||[]).forEach(e=>e.sets.forEach(s=>{v+=(+s.weight||0)*(+s.reps||0);}));return Math.round(v);}

/* ----- 운동 세션 (시작/종료 + 경과시간) -----
   설계: 운동/세트 데이터는 기존 DB.workouts[date] 그대로(백업 호환). 세션은 시간 메타만
   DB.sessions[date]에 분리 저장하고, 세션 활성 중 만든 세트엔 sid를 찍어 PR 토스트를 게이팅. */
function isSessionActive(){return !!DB.settings.activeSessionId;}
function activeSession(){
  if(!DB.settings.activeSessionId)return null;
  const d=DB.settings.activeSessionDate;
  return (DB.sessions[d]||[]).find(s=>s.id===DB.settings.activeSessionId)||null;
}
function startSession(){
  if(isSessionActive())return;
  const id='s'+Date.now();
  if(!DB.sessions[cur])DB.sessions[cur]=[];
  DB.sessions[cur].push({id,startedAt:Date.now(),endedAt:null,durationSec:0});
  DB.settings.activeSessionId=id;DB.settings.activeSessionDate=cur;
  save();startElapsed();renderAll();
}
function endSession(){
  const s=activeSession();if(!s)return;
  if(!confirm('운동을 종료할까요?'))return;
  s.endedAt=Date.now();
  s.durationSec=Math.max(0,Math.round((s.endedAt-s.startedAt)/1000));
  s.prHits=sessionPRHits(s.id);  // 종료 정산: 이 세션에서 깬 신기록 집계
  DB.settings.activeSessionId=null;DB.settings.activeSessionDate=null;
  save();stopElapsed();renderAll();
  showSessionSummary(s);
}
/* 운동 종료 인사이트 화면(시트). 데이터로 산출 가능한 것 위주, 부족분은 우아하게 생략. */
function showSessionSummary(s){

}

      <div style="margin-top:6px;font-size:13px;font-weight:700;color:var(--text-strong)">${sum.prHits.map(p=>esc(p.name)+' '+p.value+'kg').join(' · ')}</div></div>`;

  // 2) 평균 대비 비교(완료 세션 표본 있을 때만)
  html+=`<div class="card ins-card"><h2 style="margin-top:0">📊 평균 대비</h2>`;
  if(cmp){
    const vTxt=cmp.volDelta>0?'+'+cmp.volDelta.toLocaleString()+'kg':(cmp.volDelta<0?cmp.volDelta.toLocaleString()+'kg':'± 0kg');
    const dMin=Math.round(cmp.durDelta/60);
    const dTxt=dMin>0?'+'+dMin+'분':(dMin<0?dMin+'분':'± 0분');
    const vCls=cmp.volDelta>=0?'up':'down';const dCls=cmp.durDelta>=0?'up':'down';
    html+=`<div class="sum-grid">
        <div class="sum"><div class="k">볼륨</div><div class="v ins-${vCls}">${vTxt}</div><div class="muted" style="font-size:11px">평균 ${cmp.avgVol.toLocaleString()}kg</div></div>
        <div class="sum"><div class="k">시간</div><div class="v ins-${dCls}">${dTxt}</div><div class="muted" style="font-size:11px">평균 ${fmtDur(cmp.avgDur)}</div></div>
      </div>
      <div class="muted" style="font-size:11px;margin-top:8px;text-align:center">최근 ${cmp.n}개 세션 평균과 비교</div>`;
  }else{
    html+=`<div class="muted" style="font-size:13px">비교할 지난 세션이 아직 없어요. 다음 운동부터 평균 대비 변화를 보여드릴게요.</div>`;
  }

  // 3) 부위별 볼륨·세트
  const pvRows=PARTS.concat('기타').map(p=>({p,v:ps[p].volume,n:ps[p].sets})).filter(o=>o.v>0||o.n>0);
  const pvMax=Math.max(1,...pvRows.map(o=>o.v));

      return `<div style="margin-bottom:10px">

  if(timeline.length>=2){

      ${cumVolumeSVG(timeline)}

  html+=`<button class="btn mt12" onclick="closeSheet()">확인</button>`;
  return html;
}
/* 누적 볼륨 라인 그래프(자체 SVG). timeline=[{t,cum}]. */
function cumVolumeSVG(timeline){
  const W=280,H=90,pad=4;
  const max=Math.max(1,...timeline.map(p=>p.cum));
  const n=timeline.length;
  const x=i=>pad+(n<=1?0:(i/(n-1))*(W-pad*2));
  const y=v=>H-pad-(v/max)*(H-pad*2);
  const pts=timeline.map((p,i)=>x(i).toFixed(1)+','+y(p.cum).toFixed(1)).join(' ');
  const dots=timeline.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.cum).toFixed(1)}" r="2.5" fill="var(--good)"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" aria-label="볼륨 누적 추이">
    <polyline points="${pts}" fill="none" stroke="var(--good)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}
function elapsedSec(){const s=activeSession();return s?Math.max(0,Math.round((Date.now()-s.startedAt)/1000)):0;}
function fmtDur(sec){const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),x=sec%60,z=n=>String(n).padStart(2,'0');
  return h>0?h+':'+z(m)+':'+z(x):m+':'+z(x);}
/* 활성 세션이 속한 활성 세트인지(PR 토스트 게이팅용) */

}

  // 내 루틴

let exPickPart='전체', exPickQuery='', exPickRoutine=null;
/* rid 전달 시: 고른 운동을 오늘이 아니라 그 루틴에 담는다(루틴 관리에서 호출). */
function openExPicker(rid){exPickRoutine=rid||null;exPickPart='전체';exPickQuery='';renderExPicker();}
function renderExPicker(){
  const filters=['전체',...PARTS,'⭐'];
  const chips=filters.map(f=>`<button class="chip${exPickPart===f?' on':''}" onclick="setExPart('${f}')">${f}</button>`).join('');
  const q=exPickQuery.trim();
  let list=allEx();
  if(exPickPart==='⭐')list=list.filter(e=>isFav(e.name));
  else if(exPickPart!=='전체')list=list.filter(e=>e.part===exPickPart);
  if(q)list=list.filter(e=>e.name.includes(q));
  // 즐겨찾기 먼저, 그다음 부위/이름
  list.sort((a,b)=>(isFav(b.name)-isFav(a.name))||a.name.localeCompare(b.name,'ko'));
  let rows=list.map(e=>`<div class="ex-row" onclick="pickEx('${esc(e.name)}','${e.part}')">
      <span class="part-dot" style="background:var(--part-${e.part})"></span>
      <span class="exn">${esc(e.name)}</span>
      <button class="fav${isFav(e.name)?' on':''}" onclick="event.stopPropagation();favEx('${esc(e.name)}')">${isFav(e.name)?'★':'☆'}</button>
    </div>`).join('');
  if(!list.length)rows=`<div class="empty">해당하는 운동이 없어요.<br>아래에서 직접 추가해보세요.</div>`;
  const html=`<h3>운동 선택</h3>
    <div class="chiprow">${chips}</div>
    <input type="text" id="exSearch" placeholder="🔍 운동 검색" value="${esc(exPickQuery)}" oninput="exPickQuery=this.value;renderExList()">
    <div class="ex-list" id="exPickList">${rows}</div>
    <div class="divider"></div>
    <div class="muted" style="font-size:12px;margin-bottom:7px">+ 직접 추가</div>
    <input type="text" id="newExName" placeholder="새 운동 이름">
    <div class="chiprow mt8" id="newExParts">${PARTS.map((p,i)=>`<button class="chip${i===0?' on':''}" data-np="${p}" onclick="pickNewPart(this)">${p}</button>`).join('')}</div>

function lastWorkoutBefore(date){
  const ks=Object.keys(DB.workouts).filter(k=>k<date&&DB.workouts[k].length).sort();
  if(!ks.length)return null;const k=ks[ks.length-1];return {date:k,list:DB.workouts[k]};
}
/* 같은 이름 운동의 직전(현재 날짜 이전) 기록을 찾아 해당 세트 번호 값을 반환.
   세트 번호가 지난 기록보다 많으면 지난 기록의 마지막 세트로 폴백. 없으면 null. */
function prevSetFor(name,idx){
  const ks=Object.keys(DB.workouts).filter(k=>k<cur).sort();
  for(let p=ks.length-1;p>=0;p--){
    const ex=(DB.workouts[ks[p]]||[]).find(e=>e.name===name);
    if(!ex||!ex.sets.length)continue;
    const s=ex.sets[idx]||ex.sets[ex.sets.length-1];
    if((+s.weight||0)>0||(+s.reps||0)>0)return {date:ks[p],weight:s.weight,reps:s.reps};
  }
  return null;
}
function curSid(){return (isSessionActive()&&DB.settings.activeSessionDate===cur)?DB.settings.activeSessionId:undefined;}
function quickEx(name,part){if(!DB.workouts[cur])DB.workouts[cur]=[];
  DB.workouts[cur].push({name,part:part||partOf(name),sets:[{weight:'',reps:'',done:false,sid:curSid()}]});save();renderAll();}
function addSet(i){const sets=DB.workouts[cur][i].sets;const last=sets[sets.length-1]||{};
  sets.push({weight:last.weight||'',reps:last.reps||'',done:false,sid:curSid()});save();renderAll();}
/* 번핏식: 세트 '완료 체크' 토글. 미완료→완료로 켤 때 자동휴식(autoRest) 시작
   완료 시 doneAt(타임스탬프) 기록 → 세션 누적볼륨 그래프용. 해제 시 제거. */
function toggleSetDone(i,j){const set=DB.workouts[cur][i].sets[j];const nowDone=!set.done;
  set.done=nowDone;if(nowDone)set.doneAt=Date.now();else delete set.doneAt;save();renderAll();
  if(nowDone && DB.settings.autoRest!==false)startRest(restDefault());}
function delSet(i,j){DB.workouts[cur][i].sets.splice(j,1);
  if(!DB.workouts[cur][i].sets.length)DB.workouts[cur][i].sets.push({weight:'',reps:''});save();renderAll();}
function delEx(i){const ex=DB.workouts[cur][i];
  if(ex&&ex.sets.length>1&&!confirm((ex.name||'이 운동')+' 종목을 삭제할까요?'))return;
  DB.workouts[cur].splice(i,1);if(!DB.workouts[cur].length)delete DB.workouts[cur];save();renderAll();}
function setVal(i,j,f,v){DB.workouts[cur][i].sets[j][f]=v;save();
  // PR 토스트는 활성 세션의 세트일 때만(과거 기록 수정 시 오발화 방지)
  if(f==='weight' && isActiveSet(i,j)){const name=DB.workouts[cur][i].name;const w=+v||0;
    if(w>0 && w>exerciseMaxWeight(name,{date:cur,i,j})){
      toast('🏆 '+name+' 신기록 '+w+'kg!');if(navigator.vibrate)navigator.vibrate(120);}}
  document.querySelector('#view .card .tag')&&renderAll();}
function copyWorkout(date){
  DB.workouts[cur]=DB.workouts[date].map(e=>({name:e.name,part:e.part||partOf(e.name),sets:e.sets.map(s=>({weight:s.weight,reps:s.reps}))}));
  save();renderAll();toast('지난 운동을 불러왔어요');
}
/* 개인 최고기록: 저장된 운동 데이터에서 계산(별도 저장 없음) */
function exerciseMaxWeight(name,skip){
  let max=0;
  for(const d in DB.workouts){DB.workouts[d].forEach((ex,i)=>{if(ex.name!==name)return;
    ex.sets.forEach((s,j)=>{if(skip&&skip.date===d&&skip.i===i&&skip.j===j)return;
      const w=+s.weight||0;if(w>max)max=w;});});}
  return max;
}
function allPRs(){
  const best={};
  for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{ex.sets.forEach(s=>{
    const w=+s.weight||0;if(w<=0)return;
    if(!best[ex.name]||w>best[ex.name].weight)best[ex.name]={weight:w,reps:+s.reps||0,date:d};
  });});}
  return Object.entries(best).map(([name,v])=>({name,weight:v.weight,reps:v.reps,date:v.date}))
    .sort((a,b)=>b.weight-a.weight);
}

/* ----- 추정 1RM (Epley) ----- */
function epley(w,r){w=+w||0;r=+r||0;if(w<=0)return 0;return w*(1+r/30);}
/* 종목의 모든 세트에서 추정 1RM 최댓값(소수1자리 반올림). 기록 없으면 0 */
function est1RM(name){
  let max=0;
  for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{if(ex.name!==name)return;
    ex.sets.forEach(s=>{const e=epley(s.weight,s.reps);if(e>max)max=e;});});}
  return Math.round(max*10)/10;
}
/* 3대 운동(스쿼트/벤치프레스/데드리프트) 추정 1RM. 이름 부분일치 */
function bigThree(){
  const want=[['스쿼트',['스쿼트']],['벤치프레스',['벤치']],['데드리프트',['데드']]];
  const names=new Set();for(const d in DB.workouts)DB.workouts[d].forEach(ex=>names.add(ex.name));
  return want.map(([label,keys])=>{
    let max=0;names.forEach(n=>{if(keys.some(k=>n.includes(k))){const e=est1RM(n);if(e>max)max=e;}});
    return {label,oneRM:Math.round(max*10)/10};
  });
}

/* ----- 세션 신기록 집계 -----
   세션에서 입력한 세트(sid 일치)들의 종목별 최대 무게를, 세션 외 과거 전체 기록과
   비교해 갱신된 종목을 신기록으로 본다. 종료 정산용. */
function sessionPRHits(sid){
  const sessBest={};  // name -> {weight,reps}
  for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{ex.sets.forEach(s=>{
    if(s.sid!==sid)return;const w=+s.weight||0;if(w<=0)return;
    if(!sessBest[ex.name]||w>sessBest[ex.name].weight)sessBest[ex.name]={weight:w,reps:+s.reps||0};
  });});}
  const hits=[];
  for(const name in sessBest){
    const w=sessBest[name].weight;
    let prior=0;  // 이 세션 외(다른 sid/과거)의 최대
    for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{if(ex.name!==name)return;
      ex.sets.forEach(s=>{if(s.sid===sid)return;const pw=+s.weight||0;if(pw>prior)prior=pw;});});}
    if(w>prior)hits.push({name,kind:'weight',value:w});
  }
  return hits;
}
/* 세션 종료 요약 계산: 종목수·세트수·볼륨·소요시간·신기록 */
function sessionSummary(s){
  const sid=s.id;const byName={};let nSets=0,volume=0;
  for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{
    const sessSets=ex.sets.filter(st=>st.sid===sid);if(!sessSets.length)return;
    byName[ex.name]=true;
    sessSets.forEach(st=>{nSets++;volume+=(+st.weight||0)*(+st.reps||0);});
  });}
  return {nEx:Object.keys(byName).length,nSets,volume:Math.round(volume),
    durationSec:s.durationSec||0,prHits:s.prHits||[]};
}

/* ----- 운동 인사이트(종료 화면) 집계 — 모두 순수, DB.workouts/sessions 만 읽음 -----
   설계: 세션 식별은 세트의 sid. 옛 데이터(sid/doneAt 없음)는 우아하게 생략/단순화. */

/* 추정 칼로리(휴리스틱, 라벨은 '추정'). 근거: 근력운동 시간당 ~5kcal/분(약 300/h)을
   기준으로, 들어올린 볼륨 1톤당 +6kcal 가산. 데이터로만 산출 가능한 가벼운 근사치. */
function estimateCalories(durationSec,volume){
  const byTime=(durationSec/60)*5;          // 분당 5kcal
  const byVol=(volume/1000)*6;              // 볼륨 1톤당 6kcal
  return Math.max(0,Math.round(byTime+byVol));
}

/* 세션(sid)의 부위별 {volume,sets}. PARTS+기타 키 항상 존재(0 포함). */
function sessionPartStats(sid){
  const out={};PARTS.concat('기타').forEach(p=>out[p]={volume:0,sets:0});
  for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{
    const part=ex.part||partOf(ex.name);const key=(part in out)?part:'기타';
    ex.sets.forEach(st=>{if(st.sid!==sid)return;
      out[key].sets++;out[key].volume+=(+st.weight||0)*(+st.reps||0);});
  });}
  PARTS.concat('기타').forEach(p=>out[p].volume=Math.round(out[p].volume));
  return out;
}

/* 완료된(종료된) 다른 세션들의 볼륨/시간 평균과 이번 세션 비교.
   비교 표본(이번 제외 완료세션)이 없으면 null → 호출부에서 안내/생략. */
function sessionAvgCompare(s){
  const others=[];
  for(const d in DB.sessions){(DB.sessions[d]||[]).forEach(x=>{
    if(x.id===s.id||!x.endedAt)return;
    others.push({vol:sessionSummary(x).volume,dur:x.durationSec||0});});}
  if(!others.length)return null;
  const avgVol=Math.round(others.reduce((a,b)=>a+b.vol,0)/others.length);
  const avgDur=Math.round(others.reduce((a,b)=>a+b.dur,0)/others.length);
  const cs=sessionSummary(s);
  return {n:others.length,avgVol,avgDur,
    volDelta:cs.volume-avgVol,durDelta:(s.durationSec||0)-avgDur};
}

/* 세션(sid)의 완료시각(doneAt) 기준 누적 볼륨 추이.
   doneAt 가 있는 완료 세트만. 없으면 [] → 그래프 생략. */
function sessionVolumeTimeline(sid){
  const pts=[];
  for(const d in DB.workouts){DB.workouts[d].forEach(ex=>{
    ex.sets.forEach(st=>{if(st.sid!==sid||!st.doneAt)return;
      pts.push({t:st.doneAt,v:(+st.weight||0)*(+st.reps||0)});});
  });}
  pts.sort((a,b)=>a.t-b.t);
  let cum=0;return pts.map(p=>{cum+=p.v;return {t:p.t,cum:Math.round(cum)};});
}

/* 누적 완료 세션 수(N번째 기록). endedAt 있는 세션만 카운트. */
function sessionCount(){
  let n=0;for(const d in DB.sessions){(DB.sessions[d]||[]).forEach(x=>{if(x.endedAt)n++;});}
  return n;
}

/* 부위 → 인체도 SVG 영역 매핑(앞/뒤). 우리 자체 제작 단순 SVG. */
const BODY_REGIONS={
  가슴:['chest'], 어깨:['shoulderL','shoulderR'], 팔:['armL','armR'],
  복근:['abs'], 하체:['thighL','thighR','calfL','calfR'],
  등:['back'], 유산소:['cardio']
};
/* 부위별 볼륨 → 0~1 강도. 최대 부위를 1로 정규화. */
function fatigueIntensity(partStats){
  const max=Math.max(0,...PARTS.map(p=>partStats[p]?partStats[p].volume:0));
  const out={};PARTS.forEach(p=>{out[p]=max>0?(partStats[p].volume/max):0;});
  return out;
}
/* 강도(0~1)를 부위색의 채움 불투명도로. 0이면 회색 빈 영역. */
function fatigueFill(part,intensity){
  if(intensity<=0)return 'fill:var(--line);opacity:.5';
  const op=(0.18+intensity*0.82).toFixed(2);  // 약하게라도 보이게 0.18 하한
  return `fill:var(--part-${part});opacity:${op}`;
}
/* 자체 제작 인체도(앞/뒤) SVG. 부위별 볼륨 비중으로 색 농도 표시. */

      <!-- 가슴 --><rect x="36" y="32" width="28" height="16" rx="5" style="${R('가슴')}"/>
      <!-- 복근 --><rect x="40" y="50" width="20" height="20" rx="4" style="${R('복근')}"/>
      <!-- 팔 --><rect x="25" y="42" width="9" height="26" rx="4" style="${R('팔')}"/><rect x="66" y="42" width="9" height="26" rx="4" style="${R('팔')}"/>
      <!-- 하체 --><rect x="38" y="72" width="10" height="36" rx="4" style="${R('하체')}"/><rect x="52" y="72" width="10" height="36" rx="4" style="${R('하체')}"/>
      <text x="50" y="125" text-anchor="middle" font-size="9" fill="var(--muted)">앞</text>
    </g>
    <!-- 뒷면 -->
    <g transform="translate(100,0)">
      <circle cx="50" cy="18" r="9" fill="var(--surface3)"/>
      <rect x="28" y="30" width="11" height="11" rx="4" style="${R('어깨')}"/><rect x="61" y="30" width="11" height="11" rx="4" style="${R('어깨')}"/>
      <!-- 등 --><rect x="36" y="32" width="28" height="36" rx="5" style="${R('등')}"/>
      <rect x="25" y="42" width="9" height="26" rx="4" style="${R('팔')}"/><rect x="66" y="42" width="9" height="26" rx="4" style="${R('팔')}"/>
      <rect x="38" y="72" width="10" height="36" rx="4" style="${R('하체')}"/><rect x="52" y="72" width="10" height="36" rx="4" style="${R('하체')}"/>
      <text x="50" y="125" text-anchor="middle" font-size="9" fill="var(--muted)">뒤</text>
    </g>
  </svg>`;

/* ----- 루틴/프로그램 (분할 저장·불러오기) -----
   DB.routines=[{id,name,items:[{name,part}]}]. 텍스트만 저장(세트/무게는 안 담음).
   불러오면 오늘 운동(DB.workouts[cur])에 빈 세트로 종목 추가. 기존 exDB/partOf 재사용. */
function routines(){if(!Array.isArray(DB.routines))DB.routines=[];return DB.routines;}
function findRoutine(id){return routines().find(r=>r.id===id)||null;}
/* 오늘 운동 종목들을 루틴으로 저장. name 미입력 시 자동 이름. items는 {name,part}만. */
function saveCurrentAsRoutine(name){
  const list=DB.workouts[cur]||[];
  if(!list.length){toast('저장할 운동이 없어요');return null;}
  name=(name||'').trim()||('루틴 '+(routines().length+1));
  const items=list.map(e=>({name:e.name,part:e.part||partOf(e.name)}));
  const r={id:'r'+Date.now(),name,items};
  routines().push(r);save();renderAll();toast('루틴으로 저장했어요');return r;
}
/* 빈 루틴 생성(이후 운동 선택 시트로 종목 추가). */
function createEmptyRoutine(name){
  name=(name||'').trim()||('루틴 '+(routines().length+1));
  const r={id:'r'+Date.now(),name,items:[]};
  routines().push(r);save();return r;
}
/* 루틴에 종목 추가(운동 선택 시트 재사용). 중복 이름은 무시. */
function addExToRoutine(rid,name,part){
  const r=findRoutine(rid);if(!r)return;
  if(r.items.some(it=>it.name===name))return;
  r.items.push({name,part:part||partOf(name)});save();
}
function delExFromRoutine(rid,idx){const r=findRoutine(rid);if(!r)return;
  r.items.splice(idx,1);save();}
function renameRoutine(rid,name){const r=findRoutine(rid);if(!r)return;
  name=(name||'').trim();if(!name)return;r.name=name;save();renderAll();}
function delRoutine(rid){const i=routines().findIndex(r=>r.id===rid);if(i<0)return;
  routines().splice(i,1);save();renderAll();}
/* 루틴 불러오기: 루틴 종목들을 오늘 운동에 빈 세트로 추가(기존 quickEx 재사용). */
function loadRoutine(rid){
  const r=findRoutine(rid);if(!r||!r.items.length){toast('비어있는 루틴이에요');return;}
  r.items.forEach(it=>quickEx(it.name,it.part));

}

function toggleHabit(id){if(!DB.habits[cur])DB.habits[cur]={};DB.habits[cur][id]=!DB.habits[cur][id];
  if(!DB.habits[cur][id])delete DB.habits[cur][id];cleanHabit();save();renderAll();}
function stepHabit(id,step){if(!DB.habits[cur])DB.habits[cur]={};
  let v=Math.round(((+DB.habits[cur][id]||0)+step)*10)/10;if(v<0)v=0;
  DB.habits[cur][id]=v;if(!v)delete DB.habits[cur][id];cleanHabit();save();renderAll();}
function cleanHabit(){if(DB.habits[cur]&&!Object.keys(DB.habits[cur]).length)delete DB.habits[cur];}
function weekHabitGrid(){
  const days=[];for(let i=6;i>=0;i--){const d=new Date(cur+'T00:00');d.setDate(d.getDate()-i);days.push(ymd(d));}
  const checks=DB.habitDefs.filter(d=>d.type==='check');

  let html=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
    <tr><td></td>${days.map(d=>{const dd=new Date(d+'T00:00');return `<td style="text-align:center;color:var(--muted);padding:3px">${dd.getDate()}<br><span style="font-size:10px">${DOW[dd.getDay()]}</span></td>`;}).join('')}</tr>`;
  checks.forEach(def=>{
    html+=`<tr><td style="padding:5px 6px 5px 0;white-space:nowrap">${def.icon||''} ${esc(def.name)}</td>`;
    days.forEach(d=>{const on=DB.habits[d]&&DB.habits[d][def.id];

}

function metricBox(label,v,pv,unit,lowerBetter){
  let d='';
  if(v!=null&&pv!=null){const diff=Math.round((v-pv)*10)/10;
    if(diff!==0){const good=lowerBetter?diff<0:diff>0;
      d=`<div class="delta ${good?'down':'bad'}">${diff>0?'▲':'▼'} ${Math.abs(diff)}</div>`;}}
  return `<div class="metric"><div class="v">${v??'—'}<small>${v!=null?unit:''}</small></div>
    <div class="l">${label}</div>${d}</div>`;
}

function pickBodyPhoto(input){const f=input.files&&input.files[0];bodyPhotoPend=f||null;
  const lbl=document.getElementById('bodyPhotoName');if(lbl)lbl.textContent=f?'사진 1장 선택됨':'';}
async function addBody(){
  const date=document.getElementById('bDate').value;
  const weight=parseFloat(document.getElementById('bWeight').value)||null;
  const muscle=parseFloat(document.getElementById('bMuscle').value)||null;
  const fat=parseFloat(document.getElementById('bFat').value)||null;
  if(!date||(!weight&&!muscle&&!fat&&!bodyPhotoPend)){toast('값이나 사진을 하나 이상 입력해주세요');return;}
  let photo=null;
  if(bodyPhotoPend){try{photo=await savePhoto('body',date,bodyPhotoPend);}catch(e){toast('사진 처리 실패');}}
  bodyPhotoPend=null;
  const ex=DB.body.find(b=>b.date===date);
  if(ex){if(weight)ex.weight=weight;if(muscle)ex.muscle=muscle;if(fat)ex.fat=fat;if(photo)ex.photo=photo;}
  else DB.body.push({date,weight,muscle,fat,photo});

function delBody(i){const b=DB.body[i];if(b&&b.photo)idbDel(b.photo.id).catch(()=>{});
  DB.body.splice(i,1);save();renderAll();}
function drawChart(){
  const svg=document.getElementById('chart');if(!svg)return;
  const arr=[...DB.body].filter(b=>b.weight!=null).sort((a,b)=>a.date<b.date?-1:1);
  if(arr.length<1)return;
  const W=320,H=140,pad=8;
  function line(vals,color){
    const v=vals.filter(x=>x!=null);if(v.length<1)return '';
    const min=Math.min(...v),max=Math.max(...v),rng=(max-min)||1;
    const pts=vals.map((val,i)=>{if(val==null)return null;
      const x=pad+(vals.length===1?W/2-pad:i*(W-2*pad)/(vals.length-1));
      const y=H-pad-((val-min)/rng)*(H-2*pad);return [x,y];}).filter(Boolean);
    let p=`<polyline fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" points="${pts.map(p=>p.join(',')).join(' ')}"/>`;
    p+=pts.map(pt=>`<circle cx="${pt[0]}" cy="${pt[1]}" r="3" fill="${color}"/>`).join('');
    return p;
  }
  const weights=arr.map(b=>b.weight);
  const fats=arr.map(b=>b.fat!=null?b.fat:null);
  svg.innerHTML=line(weights,'#3B82F6')+(fats.some(f=>f!=null)?line(fats,'#F59E0B'):'');
}
